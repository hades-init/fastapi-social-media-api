# Spin up two services: postgres database and the fastapi app, on a shared network.

# ----- Services -----
services:

  # --- Postgresql ---
  postgres: 
    image: postgres:16-bookworm
    restart: unless-stopped
    # Named volume to persist data across container restarts.
    # It persists across: docker compose down, container rebuilds, image updates
    # It is ONLY deleted by: docker compose down -v  or  docker volume rm
    volumes: 
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - .env
    # environment:
    #   POSTGRES_USER: ${POSTGRES_USER}
    #   POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    #   POSTGRES_DB: ${POSTGRES_DB}
    # 
    # Healthcheck so the `app` service can wait until postgres is actually
    # accepting connections, not just "container started".
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 3
    # Only expose to host if you want to connect with a local psql/pgAdmin. Comment out in production.
    ports:
      - "127.0.0.1:5432:5432"
  
  # --- FastAPI Application ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fastapi-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override POSTGRES_SERVER so the app talks to the `postgres` service over the
      # compose network, NOT to localhost (which is inside the container itself).
      POSTGRES_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health-check', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "127.0.0.1:8000:8000"
    # Run alembic migrations on startup, then exec gunicorn.
    # `exec` replaces the shell so signals (SIGTERM on `docker stop`) reach gunicorn.
    command: >
      sh -c "alembic upgrade head &&
             exec gunicorn app.main:app -c gunicorn.conf.py"


# ----- Named Volumes -----
volumes:
  postgres-data:
    # Docker manages this volume — data lives at /var/lib/docker/volumes/

